name: SynthesisArc
options:
  bundleIdPrefix: com.synthesisarc
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "26.2"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    PRODUCT_NAME: "Synthesis Arc"

targets:
  SynthesisArc:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: SynthesisArc
        excludes:
          - Info.plist
    settings:
      base:
        INFOPLIST_FILE: SynthesisArc/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SUPPORTS_MACCATALYST: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
