name: SynthesisArc
options:
  bundleIdPrefix: com.synthesisarc
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "26.2"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: U8S9ZLXFJ4
    CODE_SIGN_STYLE: Automatic

targets:
  SynthesisArc_iOS:
    type: application
    platform: iOS
    sources:
      - path: SynthesisArc
        excludes:
          - Info.plist
    settings:
      base:
        INFOPLIST_FILE: SynthesisArc/Info.plist
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_BUNDLE_IDENTIFIER: com.synthesisarc.SynthesisArc-iOS
        PRODUCT_NAME: SynthesisArc
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  SynthesisArc_macOS:
    type: application
    platform: macOS
    sources:
      - path: SynthesisArc
        excludes:
          - Info.plist
    settings:
      base:
        INFOPLIST_FILE: SynthesisArc/Info.plist
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_BUNDLE_IDENTIFIER: com.synthesisarc.SynthesisArc-macOS
        PRODUCT_NAME: SynthesisArc
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  SynthesisArcUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SynthesisArcUITests
    dependencies:
      - target: SynthesisArc_iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.synthesisarc.SynthesisArcUITests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: SynthesisArc_iOS

schemes:
  SynthesisArc_iOS:
    build:
      targets:
        SynthesisArc_iOS: all
    test:
      targets:
        - SynthesisArcUITests
      gatherCoverageData: false
  SynthesisArc_macOS:
    build:
      targets:
        SynthesisArc_macOS: all